name: Build Plugin ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PLUGIN_NAME: koji_DataQuery
  ZIP_ARTIFACT: koji_DataQuery_plugin_zip
  ZIP_PATH: dist/koji_DataQuery.zip

jobs:
  build:
    name: Build QGIS plugin ZIP
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tools\build_plugin_zip.ps1

      - name: Verify plugin ZIP
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tools\validate_plugin_zip.ps1 -ZipPath "${{ env.ZIP_PATH }}" -PluginName "${{ env.PLUGIN_NAME }}"

      - name: Upload plugin ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_ARTIFACT }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
          retention-days: 30
