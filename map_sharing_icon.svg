<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <title>地図のおすそ分けパック</title>
  <defs>
    <linearGradient id="cloth" x1="12" y1="16" x2="52" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dff4ec"/>
      <stop offset="0.52" stop-color="#9fd7c9"/>
      <stop offset="1" stop-color="#5fb39f"/>
    </linearGradient>
    <linearGradient id="fold" x1="20" y1="24" x2="44" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#0e7669" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- souvenir wrapped in a furoshiki cloth -->
  <path d="M13 31
           C16 22 24 17 32 18
           C40 17 48 22 51 31
           C55 42 48 55 32 56
           C16 55 9 42 13 31 Z"
        fill="url(#cloth)" stroke="#2a6f67" stroke-width="2.3" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- furoshiki folds -->
  <path d="M18 30 C23 34 27 43 31 55" fill="none" stroke="#2a6f67" stroke-width="1.6" stroke-opacity="0.45"/>
  <path d="M46 30 C41 34 37 43 33 55" fill="none" stroke="#2a6f67" stroke-width="1.6" stroke-opacity="0.45"/>
  <path d="M18 40 C27 36 37 36 46 40" fill="none" stroke="url(#fold)" stroke-width="5" stroke-linecap="round"/>

  <!-- tied knot and cloth ears -->
  <path d="M22 21 C18 14 19 8 27 9 C31 10 32 15 31 20 C28 22 25 23 22 21 Z"
        fill="#f2c172" stroke="#8a5a2b" stroke-width="2" stroke-linejoin="round"/>
  <path d="M42 21 C46 14 45 8 37 9 C33 10 32 15 33 20 C36 22 39 23 42 21 Z"
        fill="#f2c172" stroke="#8a5a2b" stroke-width="2" stroke-linejoin="round"/>
  <path d="M27 19 C29 16 35 16 37 19 C37 24 34 27 32 28 C30 27 27 24 27 19 Z"
        fill="#e7a64f" stroke="#8a5a2b" stroke-width="2" stroke-linejoin="round"/>

  <!-- world map pattern on the furoshiki -->
  <path d="M18 34 C21 31 24 30 27 33 C25 35 23 36 24 39 C21 39 19 37 18 34 Z"
        fill="#f6d36f" stroke="#b37b27" stroke-width="0.9" stroke-linejoin="round"/>
  <path d="M31 31 C34 29 38 29 41 32 C40 35 38 36 35 35 C34 38 31 39 29 37 C30 35 32 34 31 31 Z"
        fill="#f6d36f" stroke="#b37b27" stroke-width="0.9" stroke-linejoin="round"/>
  <path d="M41 41 C44 39 47 40 48 43 C46 45 42 45 40 43 Z"
        fill="#f6d36f" stroke="#b37b27" stroke-width="0.9" stroke-linejoin="round"/>

  <!-- latitude and longitude lines to make the cloth read as a world map -->
  <path d="M15 37 C24 33 40 33 49 37" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-opacity="0.8" stroke-linecap="round"/>
  <path d="M16 45 C25 42 39 42 48 45" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M24 25 C21 33 22 46 27 54" fill="none" stroke="#ffffff" stroke-width="1.1" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M40 25 C43 33 42 46 37 54" fill="none" stroke="#ffffff" stroke-width="1.1" stroke-opacity="0.65" stroke-linecap="round"/>

  <!-- small omiyage tag -->
  <path d="M43 49 L54 45 L58 55 L47 59 Z" fill="#fff5d6" stroke="#9a6a2f" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="47" cy="50" r="1.4" fill="#9a6a2f"/>
  <path d="M47 50 C42 47 38 44 34 39" fill="none" stroke="#8a5a2b" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M49 53 H55 M50 56 H54" stroke="#d95b45" stroke-width="1.3" stroke-linecap="round"/>
</svg>
