<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <title>データの下処理</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- tidy data table -->
  <rect x="7" y="9" width="35" height="31" rx="4" fill="#ffffff" stroke="#376da8" stroke-width="2.5" filter="url(#shadow)"/>
  <path d="M7 18 H42" stroke="#376da8" stroke-width="2"/>
  <path d="M18 9 V40" stroke="#d7e6f7" stroke-width="2"/>
  <path d="M30 9 V40" stroke="#d7e6f7" stroke-width="2"/>
  <path d="M11 25 H38 M11 32 H38" stroke="#d7e6f7" stroke-width="2" stroke-linecap="round"/>
  <circle cx="12.5" cy="13.5" r="1.7" fill="#e84c3d"/>
  <circle cx="18.5" cy="13.5" r="1.7" fill="#f6c445"/>
  <circle cx="24.5" cy="13.5" r="1.7" fill="#53a867"/>

  <!-- broom handle -->
  <path d="M39 15 L53 50" stroke="#8a5a2b" stroke-width="4" stroke-linecap="round"/>
  <path d="M37 16 L41 14" stroke="#c08a4c" stroke-width="5" stroke-linecap="round"/>

  <!-- broom head sweeping data dust -->
  <path d="M45 43 L58 38 L61 48 L49 55 Z" fill="#f3b34d" stroke="#9b681f" stroke-width="2" stroke-linejoin="round"/>
  <path d="M49 45 L53 54 M53 43 L57 51 M57 41 L60 48" stroke="#8a5a2b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M10 49 C18 46 27 48 35 45" fill="none" stroke="#8bbd67" stroke-width="3" stroke-linecap="round"/>
  <circle cx="16" cy="51" r="2" fill="#8bbd67"/>
  <circle cx="25" cy="49" r="1.8" fill="#65a9e8"/>
  <circle cx="33" cy="47" r="1.8" fill="#f6c445"/>

  <!-- sparkle clean mark -->
  <path d="M47 8 L49 13 L54 15 L49 17 L47 22 L45 17 L40 15 L45 13 Z" fill="#65a9e8" stroke="#376da8" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
